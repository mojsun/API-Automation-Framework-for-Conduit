[pytest]
# Run from project root; discover tests in tests/
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
# Add project root to path so imports (config, utils) work
pythonpath = .
# Markers for categorizing tests
markers =
    smoke: Quick smoke tests (auth + critical flows)
    regression: Full regression suite
    negative: Negative and error-path tests
# Console output
addopts = -v --tb=short
# Uncomment to run only smoke by default: -m smoke
